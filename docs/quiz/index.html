<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexBot — Quiz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .back {
      align-self: flex-start;
      color: #7b2ff7;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back:hover { color: #00d4ff; }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { color: #888; margin-bottom: 40px; font-size: 0.9rem; }
    .quiz-box {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 620px;
    }
    .progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .progress-text { color: #888; font-size: 0.85rem; }
    .score { color: #00d4ff; font-weight: 700; }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #2a2a4a;
      border-radius: 2px;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .category {
      font-size: 0.75rem;
      color: #7b2ff7;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .question {
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 28px;
      color: #eee;
    }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option {
      background: #0f0f1a;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px 18px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.95rem;
      text-align: left;
      color: #ddd;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option:hover:not(.disabled) { border-color: #7b2ff7; background: #1a1a2e; }
    .option.correct { border-color: #00c853; background: rgba(0,200,83,0.1); color: #fff; }
    .option.wrong { border-color: #f44336; background: rgba(244,67,54,0.1); color: #fff; }
    .option.disabled { cursor: not-allowed; opacity: 0.7; }
    .letter {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .feedback {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.5;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct-fb { background: rgba(0,200,83,0.1); border: 1px solid #00c853; color: #00c853; }
    .feedback.wrong-fb { background: rgba(244,67,54,0.1); border: 1px solid #f44336; color: #f44336; }
    .btn-next {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
      transition: opacity 0.2s;
    }
    .btn-next:hover { opacity: 0.85; }
    .btn-next.show { display: block; }
    .result {
      text-align: center;
      display: none;
    }
    .result.show { display: block; }
    .result-icon { font-size: 4rem; margin-bottom: 16px; }
    .result-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    .result-score { font-size: 1.1rem; color: #888; margin-bottom: 28px; }
    .result-score span { color: #00d4ff; font-weight: 700; }
    .btn-restart {
      padding: 14px 32px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-restart:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <a class="back" href="../">← Voltar</a>
  <h1>🤖 Quiz</h1>
  <p class="subtitle">Responda as perguntas e teste seu conhecimento!</p>
  <div class="quiz-box">
    <div id="game">
      <div class="progress">
        <span class="progress-text" id="qNum">Pergunta 1 de 10</span>
        <span class="score" id="scoreDisplay">✅ 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="category" id="category"></div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btnNext">Próxima →</button>
    </div>
    <div class="result" id="result">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <button class="btn-restart" onclick="restart()">Jogar novamente 🔄</button>
    </div>
  </div>
  <script>
    const QUESTIONS = [
      { category: 'Ciências', question: 'Qual é o planeta mais próximo do Sol?', options: ['Vênus', 'Mercúrio', 'Marte', 'Terra'], correct: 1, explanation: 'Mercúrio é o planeta mais próximo do Sol no Sistema Solar.' },
      { category: 'Geografia', question: 'Qual é a capital do Brasil?', options: ['São Paulo', 'Rio de Janeiro', 'Brasília', 'Salvador'], correct: 2, explanation: 'Brasília é a capital federal do Brasil desde 1960.' },
      { category: 'Matemática', question: 'Quanto é 15 × 8?', options: ['110', '120', '130', '115'], correct: 1, explanation: '15 × 8 = 120.' },
      { category: 'História', question: 'Em que ano o Brasil foi descoberto?', options: ['1492', '1500', '1510', '1488'], correct: 1, explanation: 'O Brasil foi descoberto em 1500 por Pedro Álvares Cabral.' },
      { category: 'Natureza', question: 'Qual animal é conhecido como o rei da selva?', options: ['Tigre', 'Leopardo', 'Leão', 'Jaguar'], correct: 2, explanation: 'O leão é tradicionalmente chamado de rei da selva.' },
      { category: 'Tecnologia', question: 'O que significa a sigla "HTML"?', options: ['HyperText Markup Language', 'High Transfer Markup Language', 'HyperText Modern Language', 'Home Text Markup Language'], correct: 0, explanation: 'HTML significa HyperText Markup Language, a linguagem base da web.' },
      { category: 'Cultura Pop', question: 'Qual personagem vive em um abacaxi embaixo do mar?', options: ['Patrick', 'Lula Molusco', 'Bob Esponja', 'Sandy'], correct: 2, explanation: 'Bob Esponja mora em uma casa em forma de abacaxi em Fundo do Mar.' },
      { category: 'Ciências', question: 'Quantos ossos tem o corpo humano adulto?', options: ['206', '212', '198', '220'], correct: 0, explanation: 'O corpo humano adulto possui 206 ossos.' },
      { category: 'Português', question: 'Qual é o plural de "cidadão"?', options: ['Cidadões', 'Cidadãos', 'Cidadãoes', 'Cidadanes'], correct: 1, explanation: 'O plural de cidadão é cidadãos.' },
      { category: 'Esportes', question: 'Quantos jogadores tem um time de futebol em campo?', options: ['10', '12', '11', '9'], correct: 2, explanation: 'Cada time de futebol tem 11 jogadores em campo.' }
    ];
    let current = 0, score = 0, answered = false;
    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
    let questions = [];
    function init() {
      questions = shuffle(QUESTIONS);
      current = 0; score = 0; answered = false;
      document.getElementById('game').style.display = 'block';
      document.getElementById('result').classList.remove('show');
      render();
    }
    function render() {
      const q = questions[current];
      document.getElementById('qNum').textContent = `Pergunta ${current + 1} de ${questions.length}`;
      document.getElementById('scoreDisplay').textContent = `✅ ${score}`;
      document.getElementById('progressFill').style.width = `${(current / questions.length) * 100}%`;
      document.getElementById('category').textContent = q.category;
      document.getElementById('question').textContent = q.question;
      const letters = ['A', 'B', 'C', 'D'];
      const opts = document.getElementById('options');
      opts.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerHTML = `<span class="letter">${letters[i]}</span>${opt}`;
        btn.onclick = () => answer(i, q.correct, q.explanation);
        opts.appendChild(btn);
      });
      const fb = document.getElementById('feedback');
      fb.className = 'feedback'; fb.textContent = '';
      document.getElementById('btnNext').classList.remove('show');
      answered = false;
    }
    function answer(idx, correct, explanation) {
      if (answered) return;
      answered = true;
      const opts = document.querySelectorAll('.option');
      opts.forEach(o => o.classList.add('disabled'));
      const fb = document.getElementById('feedback');
      if (idx === correct) {
        score++;
        opts[idx].classList.add('correct');
        fb.className = 'feedback correct-fb show';
        fb.textContent = '✅ Correto! ' + explanation;
      } else {
        opts[idx].classList.add('wrong');
        opts[correct].classList.add('correct');
        fb.className = 'feedback wrong-fb show';
        fb.textContent = '❌ Errado! ' + explanation;
      }
      document.getElementById('scoreDisplay').textContent = `✅ ${score}`;
      document.getElementById('btnNext').classList.add('show');
    }
    document.getElementById('btnNext').onclick = () => {
      current++;
      if (current >= questions.length) showResult();
      else render();
    };
    function showResult() {
      document.getElementById('game').style.display = 'none';
      const r = document.getElementById('result');
      r.classList.add('show');
      const pct = Math.round((score / questions.length) * 100);
      let icon = '😔', title = 'Pode melhorar...';
      if (pct >= 90) { icon = '🏆'; title = 'Incrível! Você é fera!'; }
      else if (pct >= 70) { icon = '😄'; title = 'Muito bem!'; }
      else if (pct >= 50) { icon = '🙂'; title = 'Razoável!'; }
      document.getElementById('resultIcon').textContent = icon;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultScore').innerHTML = `Você acertou <span>${score} de ${questions.length}</span> perguntas (${pct}%)`;
    }
    function restart() { init(); }
    init();
  </script>
</body>
</html>
