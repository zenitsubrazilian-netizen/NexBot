<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NexBot — Slither Snake</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #050508;
  font-family: 'Segoe UI', Roboto, sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

canvas { display: block; }

/* ── BOTÃO VOLTAR ── */
.back {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 50;
  color: #fff;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  text-decoration: none;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 7px 13px;
  border-radius: 10px;
  letter-spacing: 0.5px;
  transition: background 0.2s;
}
.back:active { background: rgba(255,255,255,0.14); }

/* ── HUD ── */
.hud {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 50;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
  user-select: none;
}
.hud-card {
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 10px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.8px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.5);
}
#hud-score { border-left: 3px solid #00ff88; color: #00ff88; }
#hud-bots  { border-left: 3px solid #00d4ff; color: #00d4ff; }

/* ── JOYSTICK ── */
#joystick-zone {
  position: fixed;
  bottom: 36px;
  left: 36px;
  width: 130px;
  height: 130px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 50;
  touch-action: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 30px rgba(0,255,136,0.08), inset 0 0 20px rgba(0,0,0,0.3);
  transition: border-color 0.2s, box-shadow 0.2s;
}
#joystick-zone.active {
  border-color: rgba(0,255,136,0.5);
  box-shadow: 0 0 30px rgba(0,255,136,0.25), inset 0 0 20px rgba(0,0,0,0.3);
}
#joystick-handle {
  position: absolute;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffffff, #888);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5), 0 0 8px rgba(255,255,255,0.15);
  pointer-events: none;
  transition: transform 0.05s;
}

/* ── TELA DE INÍCIO ── */
#screen-start {
  position: fixed;
  inset: 0;
  z-index: 80;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: radial-gradient(ellipse at 50% 40%, rgba(0,255,136,0.07) 0%, rgba(5,5,8,0.98) 70%);
  backdrop-filter: blur(4px);
  text-align: center;
  padding: 24px;
}
#screen-start .logo {
  font-size: 2.6rem;
  font-weight: 900;
  background: linear-gradient(135deg, #00ff88, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
  text-shadow: none;
  line-height: 1;
}
#screen-start .subtitle {
  color: #aaa;
  font-size: 0.95rem;
  max-width: 280px;
  line-height: 1.5;
}
#screen-start .tip {
  color: #555;
  font-size: 0.78rem;
  max-width: 260px;
  line-height: 1.5;
}
.btn-play {
  padding: 15px 48px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #00ff88, #00d4ff);
  color: #050508;
  font-size: 1.1rem;
  font-weight: 900;
  cursor: pointer;
  touch-action: manipulation;
  letter-spacing: 1px;
  box-shadow: 0 0 30px rgba(0,255,136,0.4);
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-play:active { transform: scale(0.96); box-shadow: 0 0 15px rgba(0,255,136,0.3); }

/* ── TELA DE GAME OVER ── */
#screen-gameover {
  position: fixed;
  inset: 0;
  z-index: 80;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: rgba(5,5,8,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  text-align: center;
  padding: 24px;
}
#screen-gameover.show { display: flex; }
#screen-gameover h2 {
  font-size: 2rem;
  color: #ff3b30;
  text-shadow: 0 0 24px rgba(255,59,48,0.6);
  letter-spacing: 2px;
  margin: 0;
}
#screen-gameover .go-score {
  font-size: 1rem;
  color: #888;
}
#screen-gameover .go-score span {
  color: #00ff88;
  font-weight: 800;
  font-size: 1.3rem;
}
.btn-restart {
  margin-top: 6px;
  padding: 14px 40px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #00ff88, #00d4ff);
  color: #050508;
  font-size: 1rem;
  font-weight: 900;
  cursor: pointer;
  touch-action: manipulation;
  box-shadow: 0 0 24px rgba(0,255,136,0.35);
}
</style>
</head>
<body>

<a class="back" href="../">← Voltar</a>

<div class="hud">
  <div id="hud-score" class="hud-card">🟢 0 pts</div>
  <div id="hud-bots"  class="hud-card">🤖 8 bots</div>
</div>

<div id="joystick-zone">
  <div id="joystick-handle"></div>
</div>

<!-- Tela de Início -->
<div id="screen-start">
  <div class="logo">🐍 SLITHER</div>
  <div class="subtitle">Coma os orbes neon, cresça e elimine os bots sem bater nas bordas!</div>
  <button class="btn-play" id="btn-play">▶ JOGAR</button>
  <div class="tip">Use o joystick (mobile) ou as teclas WASD / setas (PC)</div>
</div>

<!-- Tela de Game Over -->
<div id="screen-gameover" id="screen-gameover">
  <h2>💀 VOCÊ MORREU</h2>
  <div class="go-score">Pontuação: <span id="final-score">0</span></div>
  <button class="btn-restart" id="btn-restart">🔄 Jogar Novamente</button>
</div>

<canvas id="c"></canvas>

<script>
'use strict'

// ══════════════════════════════════════════════
//  CANVAS & RESIZE
// ══════════════════════════════════════════════
const canvas = document.getElementById('c')
const ctx    = canvas.getContext('2d')

function resize() {
  canvas.width  = window.innerWidth
  canvas.height = window.innerHeight
}
resize()
window.addEventListener('resize', resize)

// ══════════════════════════════════════════════
//  CONSTANTES
// ══════════════════════════════════════════════
const WORLD        = { w: 3200, h: 3200 }
const FOOD_COUNT   = 180
const BOT_COUNT    = 8
const HEAD_R       = 11
const BODY_R       = 9
const SEG_GAP      = 8
const COL_DIST     = 14        // distância de colisão cabeça→corpo
const PLAYER_SPEED = 3.8
const BOT_SPEED_MIN = 2.6
const BOT_SPEED_MAX = 3.4
const SELF_COL_SKIP = 20       // ignora os N primeiros segmentos do próprio corpo

const BOT_COLORS = [
  '#ff4d6d', '#00d4ff', '#ff9f1c', '#c77dff',
  '#f72585', '#4cc9f0', '#7bed9f', '#ffd60a',
]

// ══════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════
let food      = []
let snakes    = []
let particles = []
let player    = null
let gameRunning = false
let rafId     = null

// ══════════════════════════════════════════════
//  UTILITÁRIOS
// ══════════════════════════════════════════════
const rand = (a, b) => Math.random() * (b - a) + a
const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by)

function randEdgeSafe(margin = 200) {
  return {
    x: rand(margin, WORLD.w - margin),
    y: rand(margin, WORLD.h - margin),
  }
}

// ══════════════════════════════════════════════
//  COMIDA
// ══════════════════════════════════════════════
function makeFood(x, y, premium = false) {
  const p = x !== undefined ? x : rand(30, WORLD.w - 30)
  const q = y !== undefined ? y : rand(30, WORLD.h - 30)
  return {
    x: p, y: q,
    size:  premium ? rand(7, 11) : rand(3.5, 5),
    hue:   premium ? rand(280, 340) : rand(120, 200),
    value: premium ? 3 : 1,
    phase: rand(0, Math.PI * 2),
  }
}

function refillFood() {
  while (food.length < FOOD_COUNT) food.push(makeFood())
}

// ══════════════════════════════════════════════
//  COBRA
// ══════════════════════════════════════════════
function makeSnake({ bot = false, x, y, color = '#00ff88' } = {}) {
  const sx = x ?? WORLD.w / 2
  const sy = y ?? WORLD.h / 2
  const body = []
  for (let i = 0; i < 14; i++) body.push({ x: sx, y: sy })
  return {
    bot, color,
    x: sx, y: sy,
    dir: { x: 1, y: 0 },
    speed: bot ? rand(BOT_SPEED_MIN, BOT_SPEED_MAX) : PLAYER_SPEED,
    score: 0,
    body,
    dead: false,
  }
}

// ══════════════════════════════════════════════
//  MORTE & PARTÍCULAS
// ══════════════════════════════════════════════
function spawnParticles(x, y, color, count = 40) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2)
    const spd   = rand(1.5, 8)
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r:  rand(2, 6),
      color,
      alpha: 1,
      decay: rand(0.012, 0.028),
    })
  }
}

function killSnake(snake) {
  if (snake.dead) return
  snake.dead = true

  const hx = snake.body[0].x
  const hy = snake.body[0].y
  spawnParticles(hx, hy, snake.color, 50)

  // dropa comida premium ao longo do corpo
  for (let i = 1; i < snake.body.length; i += 2) {
    if (Math.random() < 0.65) {
      food.push(makeFood(
        snake.body[i].x + rand(-12, 12),
        snake.body[i].y + rand(-12, 12),
        true,
      ))
    }
  }

  if (snake === player) {
    triggerGameOver()
  }
}

function triggerGameOver() {
  gameRunning = false
  if (rafId) { cancelAnimationFrame(rafId); rafId = null }
  document.getElementById('final-score').textContent = Math.floor(player.score)
  document.getElementById('screen-gameover').classList.add('show')
}

// ══════════════════════════════════════════════
//  REINICIAR
// ══════════════════════════════════════════════
function startGame() {
  document.getElementById('screen-start').style.display    = 'none'
  document.getElementById('screen-gameover').classList.remove('show')

  food      = []
  snakes    = []
  particles = []
  gameRunning = true

  refillFood()

  player = makeSnake({ bot: false, x: WORLD.w / 2, y: WORLD.h / 2, color: '#00ff88' })
  snakes.push(player)

  for (let i = 0; i < BOT_COUNT; i++) {
    const pos = randEdgeSafe(300)
    snakes.push(makeSnake({
      bot: true,
      x: pos.x, y: pos.y,
      color: BOT_COLORS[i % BOT_COLORS.length],
    }))
  }

  updateHUD()

  if (rafId) cancelAnimationFrame(rafId)
  rafId = requestAnimationFrame(loop)
}

// ══════════════════════════════════════════════
//  JOYSTICK
// ══════════════════════════════════════════════
const jZone   = document.getElementById('joystick-zone')
const jHandle = document.getElementById('joystick-handle')
let jActive   = false

function jMove(cx, cy) {
  if (!jActive || !gameRunning) return
  const r = jZone.getBoundingClientRect()
  const rx = r.left + r.width  / 2
  const ry = r.top  + r.height / 2
  let dx = cx - rx
  let dy = cy - ry
  const d = Math.hypot(dx, dy)
  const max = r.width / 2 - 4
  if (d > max) { dx = dx / d * max; dy = dy / d * max }
  jHandle.style.transform = `translate(${dx}px,${dy}px)`
  if (d > 6) {
    const len = Math.hypot(dx, dy)
    player.dir = { x: dx / len, y: dy / len }
  }
}

function jReset() {
  jActive = false
  jHandle.style.transform = 'translate(0,0)'
  jZone.classList.remove('active')
}

jZone.addEventListener('touchstart', e => {
  jActive = true
  jZone.classList.add('active')
  jMove(e.touches[0].clientX, e.touches[0].clientY)
}, { passive: true })
window.addEventListener('touchmove', e => {
  if (jActive) jMove(e.touches[0].clientX, e.touches[0].clientY)
}, { passive: true })
window.addEventListener('touchend', jReset)
window.addEventListener('touchcancel', jReset)

jZone.addEventListener('mousedown', e => { jActive = true; jZone.classList.add('active'); jMove(e.clientX, e.clientY) })
window.addEventListener('mousemove', e => { if (jActive) jMove(e.clientX, e.clientY) })
window.addEventListener('mouseup', jReset)

// ── Teclado (PC) ──
const KEYS = {}
window.addEventListener('keydown', e => {
  KEYS[e.key] = true
  if (!gameRunning) return
  const map = {
    ArrowUp:'up', w:'up', W:'up',
    ArrowDown:'down', s:'down', S:'down',
    ArrowLeft:'left', a:'left', A:'left',
    ArrowRight:'right', d:'right', D:'right',
  }
  const act = map[e.key]
  if (!act) return
  const dirs = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} }
  player.dir = dirs[act]
})
window.addEventListener('keyup', e => { delete KEYS[e.key] })

// ══════════════════════════════════════════════
//  IA DOS BOTS
// ══════════════════════════════════════════════
function botAI(bot) {
  const head = bot.body[0]

  // alvo: comida mais próxima com peso para premium
  let bestFood = null, bestDist = Infinity
  for (const f of food) {
    const w = dist(head.x, head.y, f.x, f.y) * (f.value > 1 ? 0.35 : 1)
    if (w < bestDist) { bestDist = w; bestFood = f }
  }

  let tx = bot.dir.x, ty = bot.dir.y
  if (bestFood) {
    const dx = bestFood.x - head.x
    const dy = bestFood.y - head.y
    const d  = Math.hypot(dx, dy) || 1
    tx = dx / d; ty = dy / d
  }

  // detecção de perigo à frente
  const look = 55
  const fx = head.x + bot.dir.x * look
  const fy = head.y + bot.dir.y * look
  let danger = false

  // borda
  if (fx < 80 || fx > WORLD.w - 80 || fy < 80 || fy > WORLD.h - 80) danger = true

  // corpos alheios
  if (!danger) {
    for (const s of snakes) {
      if (s.dead) continue
      const start = s === bot ? SELF_COL_SKIP : 0
      for (let i = start; i < s.body.length; i++) {
        if (dist(fx, fy, s.body[i].x, s.body[i].y) < COL_DIST * 2.5) {
          danger = true; break
        }
      }
      if (danger) break
    }
  }

  if (danger) {
    // vira 90° aleatório
    const angle = Math.random() < 0.5 ? Math.PI / 2 : -Math.PI / 2
    const bx = bot.dir.x, by = bot.dir.y
    bot.dir = {
      x: bx * Math.cos(angle) - by * Math.sin(angle),
      y: bx * Math.sin(angle) + by * Math.cos(angle),
    }
  } else {
    // interpola suavemente em direção ao alvo
    bot.dir.x += (tx - bot.dir.x) * 0.1
    bot.dir.y += (ty - bot.dir.y) * 0.1
    const l = Math.hypot(bot.dir.x, bot.dir.y) || 1
    bot.dir.x /= l; bot.dir.y /= l
  }
}

// ══════════════════════════════════════════════
//  MOVIMENTO
// ══════════════════════════════════════════════
function moveSnake(snake) {
  const head = snake.body[0]
  head.x += snake.dir.x * snake.speed
  head.y += snake.dir.y * snake.speed

  // borda → morte
  if (head.x < 0 || head.x > WORLD.w || head.y < 0 || head.y > WORLD.h) {
    return true // morreu
  }

  // LERP do corpo
  for (let i = 1; i < snake.body.length; i++) {
    const prev = snake.body[i - 1]
    const curr = snake.body[i]
    const dx   = prev.x - curr.x
    const dy   = prev.y - curr.y
    const d    = Math.hypot(dx, dy)
    if (d > SEG_GAP) {
      const r = SEG_GAP / d
      curr.x = prev.x - dx * r
      curr.y = prev.y - dy * r
    }
  }

  // crescimento
  const target = Math.floor(snake.score) + 14
  if (snake.body.length < target) {
    const last = snake.body[snake.body.length - 1]
    snake.body.push({ x: last.x, y: last.y })
  }

  return false
}

// ══════════════════════════════════════════════
//  COLISÃO COMIDA
// ══════════════════════════════════════════════
function eatFood(snake) {
  const head = snake.body[0]
  for (let i = food.length - 1; i >= 0; i--) {
    const f = food[i]
    if (dist(head.x, head.y, f.x, f.y) < HEAD_R + f.size + 3) {
      snake.score += f.value
      food.splice(i, 1)
    }
  }
  refillFood()
}

// ══════════════════════════════════════════════
//  COLISÃO COBRA→COBRA  (sem auto-colisão nos SELF_COL_SKIP primeiros)
// ══════════════════════════════════════════════
function checkSnakeCollisions() {
  for (const s of snakes) {
    if (s.dead) continue
    const head = s.body[0]
    for (const o of snakes) {
      if (o.dead) continue
      const startIdx = o === s ? SELF_COL_SKIP : 0
      for (let i = startIdx; i < o.body.length; i++) {
        if (dist(head.x, head.y, o.body[i].x, o.body[i].y) < COL_DIST) {
          killSnake(s)
          break
        }
      }
      if (s.dead) break
    }
  }
}

// ══════════════════════════════════════════════
//  PARTÍCULAS
// ══════════════════════════════════════════════
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]
    p.x  += p.vx; p.y += p.vy
    p.vx *= 0.93; p.vy *= 0.93
    p.alpha -= p.decay
    if (p.alpha <= 0) particles.splice(i, 1)
  }
}

// ══════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════
const BORDER_W = 40   // espessura da borda de perigo

function draw() {
  const W = canvas.width
  const H = canvas.height
  const t = Date.now() * 0.001

  // câmera centrada no jogador
  const hx  = player.body[0].x
  const hy  = player.body[0].y
  const camX = hx - W / 2
  const camY = hy - H / 2

  // ── fundo ──
  ctx.fillStyle = '#050508'
  ctx.fillRect(0, 0, W, H)

  // ── grade cyberpunk ──
  ctx.save()
  ctx.strokeStyle = 'rgba(0,212,255,0.045)'
  ctx.lineWidth = 1
  const gridSize = 80
  const gsx = (((-camX) % gridSize) + gridSize) % gridSize
  const gsy = (((-camY) % gridSize) + gridSize) % gridSize
  for (let x = gsx; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke()
  }
  for (let y = gsy; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke()
  }
  ctx.restore()

  // ── borda de perigo (overlay vermelho nas bordas do mundo) ──
  const edges = [
    { wx: 0,       wy: 0,       ww: WORLD.w, wh: BORDER_W },  // top
    { wx: 0,       wy: WORLD.h - BORDER_W, ww: WORLD.w, wh: BORDER_W }, // bottom
    { wx: 0,       wy: 0,       ww: BORDER_W, wh: WORLD.h }, // left
    { wx: WORLD.w - BORDER_W, wy: 0, ww: BORDER_W, wh: WORLD.h }, // right
  ]
  ctx.save()
  const pulse = 0.3 + 0.2 * Math.sin(t * 3)
  ctx.fillStyle = `rgba(255,59,48,${pulse})`
  for (const e of edges) {
    const sx = e.wx - camX, sy = e.wy - camY
    ctx.fillRect(sx, sy, e.ww, e.wh)
  }
  // linha de borda neon
  ctx.strokeStyle = `rgba(255,59,48,${0.6 + 0.3 * Math.sin(t * 4)})`
  ctx.lineWidth = 3
  ctx.shadowBlur = 12
  ctx.shadowColor = '#ff3b30'
  ctx.strokeRect(-camX + 1, -camY + 1, WORLD.w - 2, WORLD.h - 2)
  ctx.restore()

  // ── comida ──
  ctx.save()
  for (const f of food) {
    const sx = f.x - camX
    const sy = f.y - camY
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue
    const pulse = f.size + Math.sin(t * 2.5 + f.phase) * 1.5
    const color = `hsl(${f.hue},100%,62%)`
    ctx.beginPath()
    ctx.arc(sx, sy, Math.max(2, pulse), 0, Math.PI * 2)
    ctx.fillStyle = color
    ctx.shadowBlur  = f.value > 1 ? 22 : 12
    ctx.shadowColor = color
    ctx.fill()
  }
  ctx.restore()

  // ── cobras ──
  ctx.save()
  for (const snake of snakes) {
    if (snake.dead) continue
    const isPlayer = snake === player

    for (let i = snake.body.length - 1; i >= 0; i--) {
      const seg = snake.body[i]
      const sx  = seg.x - camX
      const sy  = seg.y - camY
      if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue

      const isHead = i === 0
      const taper  = isHead ? 1 : Math.max(0.42, 1 - i * 0.006)
      const r      = (isHead ? HEAD_R : BODY_R) * taper

      if (isHead) {
        // brilho extra na cabeça
        ctx.shadowBlur  = 28
        ctx.shadowColor = snake.color
        ctx.fillStyle   = '#ffffff'
      } else {
        // gradiente de cor ao longo do corpo
        const fade = Math.max(0.55, 1 - i * 0.003)
        ctx.shadowBlur  = 10
        ctx.shadowColor = snake.color
        // interpola para mais escuro na cauda
        ctx.fillStyle = snake.color
        ctx.globalAlpha = fade
      }

      ctx.beginPath()
      ctx.arc(sx, sy, r, 0, Math.PI * 2)
      ctx.fill()
      ctx.globalAlpha = 1

      // olhos na cabeça
      if (isHead) {
        ctx.shadowBlur = 0
        ctx.fillStyle  = '#050508'
        const ex = snake.dir.y * 4
        const ey = snake.dir.x * 4
        ctx.beginPath()
        ctx.arc(sx + snake.dir.x * 6 + ex, sy + snake.dir.y * 6 - ey, 2.8, 0, Math.PI * 2)
        ctx.arc(sx + snake.dir.x * 6 - ex, sy + snake.dir.y * 6 + ey, 2.8, 0, Math.PI * 2)
        ctx.fill()
        // brilho dos olhos
        ctx.fillStyle = '#fff'
        ctx.beginPath()
        ctx.arc(sx + snake.dir.x * 6 + ex + 0.8, sy + snake.dir.y * 6 - ey - 0.8, 0.9, 0, Math.PI * 2)
        ctx.arc(sx + snake.dir.x * 6 - ex + 0.8, sy + snake.dir.y * 6 + ey - 0.8, 0.9, 0, Math.PI * 2)
        ctx.fill()
      }
    }

    // nome/label acima da cabeça do player
    if (isPlayer) {
      const hsx = player.body[0].x - camX
      const hsy = player.body[0].y - camY
      ctx.shadowBlur = 0
      ctx.globalAlpha = 0.85
      ctx.fillStyle = '#00ff88'
      ctx.font = 'bold 11px Segoe UI'
      ctx.textAlign = 'center'
      ctx.fillText('VOCÊ', hsx, hsy - HEAD_R - 7)
      ctx.textAlign = 'left'
      ctx.globalAlpha = 1
    }
  }
  ctx.restore()

  // ── partículas ──
  ctx.save()
  for (const p of particles) {
    ctx.globalAlpha  = p.alpha
    ctx.fillStyle    = p.color
    ctx.shadowBlur   = 14
    ctx.shadowColor  = p.color
    ctx.beginPath()
    ctx.arc(p.x - camX, p.y - camY, p.r, 0, Math.PI * 2)
    ctx.fill()
  }
  ctx.globalAlpha = 1
  ctx.restore()

  // ── minimap ──
  drawMinimap(camX, camY, W, H)
}

function drawMinimap(camX, camY, W, H) {
  const MM = 110, PAD = 14
  const mx = W - MM - PAD, my = H - MM - PAD
  const sx = MM / WORLD.w, sy = MM / WORLD.h

  ctx.save()
  ctx.globalAlpha = 0.72
  ctx.fillStyle   = 'rgba(0,0,0,0.6)'
  ctx.strokeStyle = 'rgba(0,212,255,0.3)'
  ctx.lineWidth   = 1
  ctx.beginPath()
  ctx.roundRect(mx - 2, my - 2, MM + 4, MM + 4, 6)
  ctx.fill()
  ctx.stroke()

  // comida no minimap
  ctx.fillStyle = 'rgba(0,255,136,0.5)'
  for (const f of food) {
    ctx.fillRect(mx + f.x * sx - 0.5, my + f.y * sy - 0.5, 1, 1)
  }

  // cobras no minimap
  for (const s of snakes) {
    if (s.dead || !s.body.length) continue
    ctx.fillStyle = s === player ? '#ffffff' : s.color
    const hx = s.body[0].x, hy = s.body[0].y
    ctx.beginPath()
    ctx.arc(mx + hx * sx, my + hy * sy, s === player ? 3 : 2, 0, Math.PI * 2)
    ctx.fill()
  }

  // câmera viewport
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'
  ctx.strokeRect(
    mx + camX * sx, my + camY * sy,
    canvas.width * sx, canvas.height * sy,
  )
  ctx.restore()
}

// ══════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════
function updateHUD() {
  const score = Math.floor(player.score)
  const bots  = snakes.filter(s => s.bot && !s.dead).length
  document.getElementById('hud-score').textContent = `🟢 ${score} pts`
  document.getElementById('hud-bots').textContent  = `🤖 ${bots} bots`
}

// ══════════════════════════════════════════════
//  LOOP PRINCIPAL
// ══════════════════════════════════════════════
function loop() {
  if (!gameRunning) return

  // mover bots
  for (const s of snakes) {
    if (s.bot && !s.dead) botAI(s)
  }

  // mover todas as cobras
  for (const s of snakes) {
    if (s.dead) continue
    const hitWall = moveSnake(s)
    if (hitWall) killSnake(s)
  }

  if (!gameRunning) return  // player morreu na borda

  // comer comida
  for (const s of snakes) {
    if (!s.dead) eatFood(s)
  }

  // colisões cobra→cobra
  checkSnakeCollisions()

  if (!gameRunning) return  // player morreu em colisão

  // respawn de bots mortos
  for (let i = 0; i < snakes.length; i++) {
    if (snakes[i].bot && snakes[i].dead) {
      const pos = randEdgeSafe(300)
      snakes[i] = makeSnake({
        bot: true,
        x: pos.x, y: pos.y,
        color: BOT_COLORS[(i - 1) % BOT_COLORS.length],
      })
    }
  }

  updateParticles()
  draw()
  updateHUD()

  rafId = requestAnimationFrame(loop)
}

// ══════════════════════════════════════════════
//  BOTÕES UI
// ══════════════════════════════════════════════
document.getElementById('btn-play').addEventListener('click', startGame)
document.getElementById('btn-play').addEventListener('touchstart', e => {
  e.preventDefault(); startGame()
}, { passive: false })

document.getElementById('btn-restart').addEventListener('click', startGame)
document.getElementById('btn-restart').addEventListener('touchstart', e => {
  e.preventDefault(); startGame()
}, { passive: false })

// primeiro frame de fundo (sem game ativo)
ctx.fillStyle = '#050508'
ctx.fillRect(0, 0, canvas.width, canvas.height)
</script>
