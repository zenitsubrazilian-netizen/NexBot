<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NexBot — Forca</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .back {
      align-self: flex-start;
      color: #7b2ff7;
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 20px;
      padding: 8px 0;
    }
    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
      text-align: center;
    }
    .subtitle {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .game-container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .gallows {
      width: 140px;
      height: 160px;
    }
    .gallows svg {
      width: 100%;
      height: 100%;
    }
    .word-display {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
      padding: 0 8px;
    }
    .letter-box {
      width: 36px;
      height: 44px;
      border-bottom: 3px solid #7b2ff7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .letter-box.revealed {
      border-color: #00c853;
      color: #00c853;
    }
    .info-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #1a1a2e;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      font-size: 0.85rem;
    }
    .errors { color: #f44336; font-weight: 700; }
    .wrong-letters { color: #888; font-size: 0.8rem; }
    .keyboard {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
    }
    .key {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 2px solid #2a2a4a;
      background: #1a1a2e;
      color: #ddd;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      transition: background 0.1s, border-color 0.1s;
    }
    .key.correct {
      border-color: #00c853;
      background: rgba(0,200,83,0.15);
      color: #00c853;
      pointer-events: none;
    }
    .key.wrong {
      border-color: #f44336;
      background: rgba(244,67,54,0.1);
      color: #f44336;
      pointer-events: none;
    }
    .key.pressed {
      background: #2a1a4a;
      border-color: #00d4ff;
      color: #fff;
    }
    .status-msg {
      width: 100%;
      text-align: center;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      display: none;
    }
    .status-msg.win {
      background: rgba(0,200,83,0.1);
      border: 1px solid #00c853;
      color: #00c853;
      display: block;
    }
    .status-msg.lose {
      background: rgba(244,67,54,0.1);
      border: 1px solid #f44336;
      color: #f44336;
      display: block;
    }
    .btn-restart {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      display: none;
    }
    .btn-restart.show { display: block; }
  </style>
</head>
<body>
  <a class="back" href="../">← Voltar</a>
  <h1>🎮 Forca</h1>
  <p class="subtitle">Descubra a palavra antes de acabar as tentativas!</p>
  <div class="game-container">
    <div class="gallows">
      <svg viewBox="0 0 160 180">
        <line x1="10" y1="175" x2="150" y2="175" stroke="#444" stroke-width="4" stroke-linecap="round"/>
        <line x1="40" y1="175" x2="40" y2="10" stroke="#444" stroke-width="4" stroke-linecap="round"/>
        <line x1="40" y1="10" x2="100" y2="10" stroke="#444" stroke-width="4" stroke-linecap="round"/>
        <line x1="100" y1="10" x2="100" y2="35" stroke="#444" stroke-width="4" stroke-linecap="round"/>
        <circle id="p-head" cx="100" cy="50" r="15" stroke="#f44336" stroke-width="3" fill="none" visibility="hidden"/>
        <line id="p-body" x1="100" y1="65" x2="100" y2="115" stroke="#f44336" stroke-width="3" stroke-linecap="round" visibility="hidden"/>
        <line id="p-arm1" x1="100" y1="80" x2="75" y2="100" stroke="#f44336" stroke-width="3" stroke-linecap="round" visibility="hidden"/>
        <line id="p-arm2" x1="100" y1="80" x2="125" y2="100" stroke="#f44336" stroke-width="3" stroke-linecap="round" visibility="hidden"/>
        <line id="p-leg1" x1="100" y1="115" x2="75" y2="145" stroke="#f44336" stroke-width="3" stroke-linecap="round" visibility="hidden"/>
        <line id="p-leg2" x1="100" y1="115" x2="125" y2="145" stroke="#f44336" stroke-width="3" stroke-linecap="round" visibility="hidden"/>
      </svg>
    </div>
    <div class="word-display" id="wordDisplay"></div>
    <div class="info-row">
      <span class="errors" id="errorsDisplay">❌ Erros: 0 / 6</span>
      <span class="wrong-letters" id="wrongLetters">Erradas: —</span>
    </div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="keyboard" id="keyboard"></div>
    <button class="btn-restart" id="btnRestart">Jogar novamente 🔄</button>
  </div>
  <script>
    const PARTS = ['p-head','p-body','p-arm1','p-arm2','p-leg1','p-leg2'];
    const PALAVRAS = [
      'BANANA','COMPUTADOR','WHATSAPP','AMIZADE','AVENTURA',
      'BORBOLETA','CHOCOLATE','DIAMANTE','ELEFANTE','FLORESTA',
      'GIRAFA','HARMONIA','INTERNET','JARDIM','LIBERDADE',
      'MONTANHA','NATUREZA','OCEANO','PAISAGEM','RESPEITO',
      'SAUDADE','TRABALHO','UNIVERSO','VITORIA','XADREZ',
      'ZEBRA','ARQUIVO','BONECA','CACHORRO','ESCOLA',
      'FAMILIA','GAVETA','HOSPITAL','JANELA','LARANJA',
      'MUSICA','NUVEM','OVELHA','QUARTO','ROCHA',
      'TARTARUGA','URSO','VENTO','ABELHA','BARCO',
      'FOGUETE','PLANETA','ESTRELA','GUITARRA','PALMEIRA',
      'BORRACHA','MOCHILA','ESPELHO','CHAPEU','TECLADO',
      'SERPENTE','PINGUIM','MACACO','COELHO','CASTELO'
    ];

    function normalize(str) {
      return str.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    let word = '';
    let guessed = [];
    let wrong = [];
    let gameOver = false;

    function init() {
      word = normalize(PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)]);
      guessed = [];
      wrong = [];
      gameOver = false;
      PARTS.forEach(id => document.getElementById(id).setAttribute('visibility', 'hidden'));
      document.getElementById('statusMsg').className = 'status-msg';
      document.getElementById('statusMsg').textContent = '';
      document.getElementById('btnRestart').classList.remove('show');
      renderAll();
    }

    function renderAll() {
      renderWord();
      renderKeyboard();
      renderInfo();
    }

    function renderWord() {
      const d = document.getElementById('wordDisplay');
      d.innerHTML = word.split('').map(l => {
        const rev = guessed.includes(l);
        return `<div class="letter-box${rev ? ' revealed' : ''}">${rev ? l : ''}</div>`;
      }).join('');
    }

    function renderKeyboard() {
      const kb = document.getElementById('keyboard');
      kb.innerHTML = '';
      'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
        const btn = document.createElement('div');
        btn.className = 'key';
        btn.textContent = l;
        if (guessed.includes(l)) {
          btn.classList.add('correct');
        } else if (wrong.includes(l)) {
          btn.classList.add('wrong');
        } else {
          btn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (gameOver) return;
            this.classList.add('pressed');
            handleGuess(l);
          }, { passive: false });
        }
        kb.appendChild(btn);
      });
    }

    function renderInfo() {
      document.getElementById('errorsDisplay').textContent = `❌ Erros: ${wrong.length} / 6`;
      document.getElementById('wrongLetters').textContent = wrong.length
        ? `Erradas: ${wrong.join(', ')}`
        : 'Erradas: —';
    }

    function handleGuess(l) {
      if (gameOver || guessed.includes(l) || wrong.includes(l)) return;
      if (word.includes(l)) {
        guessed.push(l);
      } else {
        wrong.push(l);
        const idx = wrong.length - 1;
        if (idx < PARTS.length) {
          document.getElementById(PARTS[idx]).setAttribute('visibility', 'visible');
        }
      }
      renderAll();
      const won = word.split('').every(c => guessed.includes(c));
      if (won) { endGame(true); return; }
      if (wrong.length >= 6) { endGame(false); }
    }

    function endGame(won) {
      gameOver = true;
      const msg = document.getElementById('statusMsg');
      if (won) {
        msg.className = 'status-msg win';
        msg.textContent = '🏆 Parabéns! Você acertou!';
      } else {
        msg.className = 'status-msg lose';
        msg.textContent = `💀 Fim de jogo! A palavra era: ${word}`;
      }
      document.getElementById('btnRestart').classList.add('show');
    }

    document.getElementById('btnRestart').addEventListener('touchstart', function(e) {
      e.preventDefault();
      init();
    }, { passive: false });

    init();
  </script>
</body>
</html>
